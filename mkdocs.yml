site_name: MeshCore Canada
site_url: https://meshcore.ca
repo_name: MeshCore Canada
repo_url: https://github.com/MeshCore-ca/MeshCore-Canada

theme:
  name: material
  favicon: assets/MeshCore-Canada-Favicon.png       # optional
  logo: assets/MeshCore-Canada-Favicon.png             # optional
  palette:
      scheme: slate
      primary: indigo
      accent: blue
  features:
    - navigation.top
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

nav:
  - Welcome: index.md
  - MeshCore:
      - Introduction: meshcore/intro.md
      - FAQ: meshcore/faq.md
      - Recommended Companions: meshcore/companions.md
      - Recommended Repeaters: meshcore/repeaters.md
      - Repeater Build Guides: meshcore/repeater-builds.md
      - Recommended Antennas: meshcore/antennas.md
  - Analyzer & MQTT:
      - Overview: analyzer/intro.md
      - Check Your Observer: analyzer/verify.md
      - Troubleshooting: analyzer/troubleshooting.md
      - Build Guides:
          - MCtoMQTT Script: analyzer/builds/mctomqtt.md
          - MeshCore-HA: analyzer/builds/meshcore-ha.md
          - MQTT Firmware: analyzer/builds/mqtt-firmware.md
          - PyMC: analyzer/builds/pymc.md
  - Mesh Directory:
      - British Columbia: provinces/british-columbia.md
      - Alberta: provinces/alberta.md
      - Saskatchewan: provinces/saskatchewan.md
      - Manitoba: provinces/manitoba.md
      - Ontario: provinces/ontario.md
      - Quebec: provinces/quebec.md
      - New Brunswick: provinces/new-brunswick.md
      - Nova Scotia: provinces/nova-scotia.md
      - Prince Edward Island: provinces/prince-edward-island.md
      - Newfoundland and Labrador: provinces/newfoundland-and-labrador.md
      - Territories (YT / NT / NU): provinces/territories.md
  - Resources:
      - Getting Started: resources/getting-started.md
      - Useful Links: resources/links.md
      - Glossary: resources/glossary.md
  - Contributing: contributing.md
